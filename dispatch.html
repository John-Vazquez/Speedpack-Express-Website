    .timeline { position: relative; height: 36px; }
    .timeline::before {
      content:''; position:absolute; left:0; right:0; top:16px; height:6px;
      background:#d1d5db; border-radius:999px;
    }
    .timeline .fill {
      position:absolute; left:0; top:16px; height:6px; width:50%;
      background:#facc15; border-radius:999px;
      box-shadow: 0 0 6px rgba(250, 204, 21, 0.6);
    }
    .timeline .fill.late {
  background: #dc2626; /* red */
}
    .timeline .start, .timeline .end {
      position:absolute; top:5px; width:28px; height:28px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff;
      background:#facc15; z-index:2;
    }
    .timeline .start { left:-2px; }
    .timeline .end { right:-2px; background:#fff; color:#facc15; border:1px solid #facc15; }
    .timeline-text { position:absolute; top:-4px; left:50%; transform:translateX(-50%); font-size:11px; white-space:nowrap; color:#111827; }

    /* RESPONSIVE DISPATCH ROW FIX */
.dispatch-shell {
  width: min(98vw, 1900px);
  max-width: none;
}

.shipments-card {
  overflow-x: hidden;
}

.job-list {
  width: 100%;
  overflow: hidden;
}

.job-row {
  width: 100%;
  box-sizing: border-box;
  grid-template-columns:
    28px
    minmax(75px, .6fr)
    minmax(105px, .8fr)
    minmax(300px, 3.2fr)
    minmax(130px, .9fr)
    minmax(180px, 1.2fr);
  gap: clamp(6px, .7vw, 12px);
  padding: 10px clamp(8px, 1vw, 16px);
  overflow: hidden;
}

.route-cell {
  min-width: 0;
  width: 100%;
  grid-template-columns:
    minmax(95px, 1fr)
    minmax(120px, 2fr)
    minmax(95px, 1fr)
    minmax(80px, .8fr);
  gap: clamp(6px, 1vw, 14px);
}

.place,
.mini-meta,
.deadline-cell,
.actions-cell {
  min-width: 0;
}

.place-text,
.note-text,
.deadline-cell,
.mini-meta {

  function formatDeadline(val){
    const d = new Date(val);
    if (isNaN(d)) return val || '';
    return `${pad(d.getMonth()+1)}/${pad(d.getDate())}/${pad(d.getFullYear()%100)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function formatReadyTime(job) {
  const val = job.ready_time || job.readyTime || job.pickup_time || job.pickupTime || job.ready || null;
  if (!val) return 'Not uploaded yet';

  const d = new Date(val);
  if (isNaN(d)) return val;

  return `${pad(d.getMonth()+1)}/${pad(d.getDate())}/${pad(d.getFullYear()%100)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}


  function getJobStatusClass(deadline) {
    const d = new Date(deadline);
    if (isNaN(d)) return '';
    const now = new Date();
    if (d < now) return 'status-overdue';
    const diffMinutes = (d - now) / (1000 * 60);
    if (diffMinutes <= 60) return 'status-due-soon';
    const sameDay = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
    return sameDay ? 'status-due-today' : '';
  }

  function getDeadlineStatusText(deadline) {
  const d = new Date(deadline);
  if (isNaN(d)) return 'scheduled';

  const now = new Date();
  const diffMs = now - d;

  if (diffMs <= 0) return 'scheduled';

  const totalMinutes = Math.floor(diffMs / (1000 * 60));
  const days = Math.floor(totalMinutes / 1440);
  const hours = Math.floor((totalMinutes % 1440) / 60);
  const minutes = totalMinutes % 60;

  if (days > 0) return `${days}d ${hours}h overdue`;
  if (hours > 0) return `${hours}h ${minutes}m overdue`;
  return `${minutes}m overdue`;
}

function parseTimeToday(timeText) {
  if (!timeText) return null;

  const now = new Date();
  const clean = timeText.trim().toLowerCase();

  const match = clean.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)?$/);
  if (!match) return null;

  let hours = Number(match[1]);
  const minutes = Number(match[2] || 0);
  const ampm = match[3];

  if (ampm === 'pm' && hours !== 12) hours += 12;
  if (ampm === 'am' && hours === 12) hours = 0;

  const d = new Date(now);
  d.setHours(hours, minutes, 0, 0);
  return d;
}

function getProgressPercent(job) {
  const progress = getJobProgress(job.id);

  // Do not start the bar until pickup has been confirmed
  if (!progress.pickupConfirmed) return 0;

  const readyVal = job.ready_time || job.readyTime || job.pickup_time || job.pickupTime || job.ready || null;
  const ready = new Date(readyVal);
  const deadline = new Date(job.deadline);
  const now = new Date();

  if (isNaN(ready) || isNaN(deadline)) return 0;
  if (now <= ready) return 0;
  if (now >= deadline) return 100;

  const total = deadline - ready;
  const elapsed = now - ready;

  return Math.round((elapsed / total) * 100);
}

async function deleteDocument(jobId, slotNumber, filePath) {
  const confirmDelete = confirm('Delete this document?');
  if (!confirmDelete) return;

  await sb.storage
    .from('job-documents')
    .remove([filePath]);

  await sb
    .from('job_documents')
    .delete()
    .eq('job_id', jobId)
    .eq('slot_number', slotNumber);

  renderDocsGrid();
}

async function renderDocsGrid() {
  if (!CURRENT_DOCS_JOB) return;

  const docs = await loadJobDocuments(CURRENT_DOCS_JOB.id);

  const grid = document.getElementById('docs-grid');
  grid.innerHTML = '';

  for (let i = 1; i <= 10; i++) {
    const existing = docs.find(d => Number(d.slot_number) === i);

    const slot = document.createElement('div');
    slot.className = `doc-slot ${existing ? 'has-doc' : ''}`;

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.className = 'doc-file-input';
    fileInput.accept = 'application/pdf,image/png,image/jpeg,image/webp';

    slot.innerHTML = existing
      ? `
        <span class="doc-remove">×</span>
        <div>
          📄<br>
          ${escapeHtml(existing.file_name)}
        </div>
      `
      : `
        <div>
          Slot ${i}<br>
          Click or Drop PDF/Image
        </div>
      `;

    async function uploadFileToSlot(file) {
      if (!file) return;

      const allowed = [
        'application/pdf',
        'image/png',
        'image/jpeg',
        'image/webp'
      ];

      if (!allowed.includes(file.type)) {
        alert('Only PDF and image files allowed.');
        return;
      }

      slot.innerHTML = `<div>Uploading...</div>`;

      const cleanName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = `${CURRENT_DOCS_JOB.id}/slot-${i}-${Date.now()}-${cleanName}`;

      const { error: uploadError } = await sb.storage
        .from('job-documents')
        .upload(path, file, {
          upsert: true
        });

      if (uploadError) {
        console.error(uploadError);
        alert(`Upload failed: ${uploadError.message}`);
        renderDocsGrid();
        return;
      }

      const { error: saveError } = await sb
        .from('job_documents')
        .upsert({
          job_id: CURRENT_DOCS_JOB.id,
          slot_number: i,
          file_name: file.name,
          file_path: path,
          file_type: file.type
        }, {
          onConflict: 'job_id,slot_number'
        });

      if (saveError) {
        console.error(saveError);
        alert(`Database save failed: ${saveError.message}`);
        renderDocsGrid();
        return;
      }

      renderDocsGrid();
    }

    fileInput.addEventListener('change', () => {
      uploadFileToSlot(fileInput.files[0]);
    });

    slot.addEventListener('click', (e) => {
      if (e.target.classList.contains('doc-remove')) {
        e.stopPropagation();
        if (!existing) return;
        deleteDocument(CURRENT_DOCS_JOB.id, i, existing.file_path);
        return;
      }

      if (existing) {
        openDocument(existing.file_path);
        return;
      }

      fileInput.click();
    });

    slot.addEventListener('dragover', (e) => {
      e.preventDefault();
      slot.classList.add('drag-over');
    });

    slot.addEventListener('dragleave', () => {
      slot.classList.remove('drag-over');
    });

    slot.addEventListener('drop', async (e) => {
      e.preventDefault();
      slot.classList.remove('drag-over');

      const file = e.dataTransfer.files[0];
      await uploadFileToSlot(file);
    });

    slot.appendChild(fileInput);
    grid.appendChild(slot);
  }
}

    .in('id', selectedIds);

  if (error) {
    alert('Bulk archive failed.');
    return;
  }

  loadJobs();
});
document.getElementById('address-modal-close').addEventListener('click', closeAddressModal);

document.getElementById('docs-modal-close').addEventListener('click', closeDocsModal);

document.getElementById('docs-modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'docs-modal-backdrop') {
    closeDocsModal();
  }
});

document.getElementById('address-modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'address-modal-backdrop') closeAddressModal();
});

document.getElementById('address-modal-save').addEventListener('click', async () => {
  if (!CURRENT_ADDRESS_JOB_ID || !CURRENT_ADDRESS_TYPE) return;

  const address = readAddressModal();
  const textValue = addressToText(address, 'None');

  const updatePayload = CURRENT_ADDRESS_TYPE === 'pickup'
    ? {
        pickup_address: address,
        pickup_location: textValue
      }
    : {
        delivery_address: address,
        delivery_location: textValue
      };

  const { error } = await sb
    .from('jobs')
    .update(updatePayload)
    .eq('id', CURRENT_ADDRESS_JOB_ID);

  if (error) {
    alert('Failed to save address.');
    return;
  }

  closeAddressModal();
  loadJobs();
});
document.getElementById('time-modal-close').addEventListener('click', closeTimeModal);

document.getElementById('time-modal-backdrop').addEventListener('click', (e) => {
  if (e.target.id === 'time-modal-backdrop') closeTimeModal();
});

document.getElementById('time-modal-save').addEventListener('click', async () => {
  if (!CURRENT_TIME_JOB_ID) return;

  const readyTime = document.getElementById('modal-ready-time').value;
  const deadlineTime = document.getElementById('modal-deadline-time').value;

  if (!readyTime || !deadlineTime) {
    alert('Enter both pickup and delivery times.');
    return;
  }

  const { error } = await sb
    .from('jobs')
    .update({
      ready_time: new Date(readyTime).toISOString(),
      deadline: new Date(deadlineTime).toISOString()
    })
    .eq('id', CURRENT_TIME_JOB_ID);

  if (error) {
    alert('Failed to update times.');
    return;
  }

  closeTimeModal();
  loadJobs();
});

window.addEventListener('dragover', (e) => {
  e.preventDefault();
});

window.addEventListener('drop', (e) => {
  e.preventDefault();
});
document.getElementById('job-search').addEventListener('input', loadJobs);
  document.querySelector('.archive-title').addEventListener('click', () => document.querySelector('.archive-card').classList.toggle('expanded'));
  document.getElementById('archive-search').addEventListener('click', e => e.stopPropagation());
  document.getElementById('archive-search').addEventListener('input', loadJobs);
  ['driver-filter', 'delivery-date-filter', 'category-filter', 'client-filter'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', loadJobs);
});
  document.getElementById('reset-search').addEventListener('click', (e) => { e.preventDefault(); document.getElementById('job-search').value=''; loadJobs(); });

  document.getElementById('job-form').addEventListener('submit', async (e) => {
  e.preventDefault();

  const title = document.getElementById('jobTitle').value.trim();
  if (!title) {
    alert('Job number is required.');
    return;
  }

  const typedDriver = document.getElementById('driver').value.trim();
  const validDriver = ONTIME_DRIVERS.some(d => d.name === typedDriver);

  if (typedDriver && !validDriver) {
    alert('Please select a driver from the driver search list, or leave it blank.');
    return;
  }

  const readyTime = document.getElementById('readyTime').value.trim();
  const deadline = document.getElementById('deadline').value.trim();
  const category = document.getElementById('jobCategory').value || 'bullshit';
  const awbNumber = document.getElementById('awbNumber').value.trim();
  const pickupLocation = document.getElementById('pickupLocation').value.trim();
  const deliveryLocation = document.getElementById('deliveryLocation').value.trim();
  const notes = document.getElementById('jobNotes').value.trim();

  const payload = {
    title,
    driver: validDriver ? typedDriver : 'Unassigned',
    ready_time: readyTime ? new Date(readyTime).toISOString() : null,
    deadline: deadline ? new Date(deadline).toISOString() : null,
    category,
    awb_number: awbNumber || 'None',
    pickup_location: pickupLocation || 'None',
delivery_location: deliveryLocation || 'None',
pickup_address: blankAddress(),
delivery_address: blankAddress(),
    notes: notes || 'None',
    is_archived: false
  };

  const { error } = await sb.from('jobs').insert(payload);

  if (error) {
    console.error('Insert error:', error);
    alert(`Failed to add job: ${error.message}`);
    return;
  }

  ADD_SELECTED_DRIVER_NAME = "";
  await loadJobs();
  e.target.reset();
  document.getElementById('jobCategory').value = 'bullshit';
});

  window.addEventListener('DOMContentLoaded', async () => {
  await loadOntimeDrivers();
  setupAddJobDriverSearch();
  loadJobs();
  sb.channel('jobs-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'jobs' }, loadJobs).subscribe();
});
</script>
</body>
</html>
