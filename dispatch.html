  const CATEGORY_LABELS = { mia:"MIA Recovery", fll:"FLL Recovery", tenders:"Tenders", deliveries:"Deliveries", dispatched:"Dispatched", bullshit:"Bullshit Pile" };

const activeJobsList = document.getElementById('active-jobs-list');

  function escapeHtml(str = "") {
    return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");
  }
  function pad(n){ return String(n).padStart(2,'0'); }
  function formatDeadline(val){
    const d = new Date(val);
    if (isNaN(d)) return val || '';
    return `${pad(d.getMonth()+1)}/${pad(d.getDate())}/${pad(d.getFullYear()%100)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function getJobStatusClass(deadline) {
    const d = new Date(deadline);
    if (isNaN(d)) return '';
    const now = new Date();
    if (d < now) return 'status-overdue';
    const diffMinutes = (d - now) / (1000 * 60);
    if (diffMinutes <= 60) return 'status-due-soon';
    const sameDay = d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
    return sameDay ? 'status-due-today' : '';
  }

  function getDeadlineStatusText(deadline) {
  const d = new Date(deadline);
  if (isNaN(d)) return 'scheduled';

  const now = new Date();
  const diffMs = now - d;

  if (diffMs <= 0) return 'scheduled';

  const totalMinutes = Math.floor(diffMs / (1000 * 60));
  const days = Math.floor(totalMinutes / 1440);
  const hours = Math.floor((totalMinutes % 1440) / 60);
  const minutes = totalMinutes % 60;

  if (days > 0) return `${days}d ${hours}h overdue`;
  if (hours > 0) return `${hours}h ${minutes}m overdue`;
  return `${minutes}m overdue`;
}
 function isArchivedJob(job) {
  const d = new Date(job.deadline);
  if (isNaN(d)) return false;

  const cutoff = new Date();
  cutoff.setHours(cutoff.getHours() - 12);

  return d < cutoff;
}


function getJobClient(job) {
  const clientText = [
    job.client,
    job.customer,
    job.customer_name,
    job.type,
    job.job_type,
    job.source,
    job.notes
  ].filter(Boolean).join(' ').toLowerCase();

  if (clientText.includes('airspace')) return 'airspace';
  if (clientText.includes('quick') || clientText.includes('sterling')) return 'quicksterling';

  const jobNum = String(job.title || '').trim();

  // Quick/Sterling usually ends in a letter, like 373739M
  if (/[a-z]$/i.test(jobNum)) return 'quicksterling';

  // Airspace usually numbers only
  if (/^\d+$/.test(jobNum)) return 'airspace';

  return 'unknown';
}


  function jobMatchesSearch(job, query) {
    if (!query) return true;
    return [job.title, job.driver, job.notes, CATEGORY_LABELS[job.category], formatDeadline(job.deadline)]
      .filter(Boolean).join(' ').toLowerCase().includes(query);
  }

function getJobProgress(jobId) {
  return JSON.parse(localStorage.getItem(`job-progress-${jobId}`) || '{}');
}

function saveJobProgress(jobId, data) {
  localStorage.setItem(`job-progress-${jobId}`, JSON.stringify(data));
}
function parseTimeToday(timeText) {
  if (!timeText) return null;

  const now = new Date();
  const clean = timeText.trim().toLowerCase();

  const match = clean.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)?$/);
  if (!match) return null;

  let hours = Number(match[1]);
  const minutes = Number(match[2] || 0);
  const ampm = match[3];

  if (ampm === 'pm' && hours !== 12) hours += 12;
  if (ampm === 'am' && hours === 12) hours = 0;

  const d = new Date(now);
  d.setHours(hours, minutes, 0, 0);
  return d;
}

function getProgressPercent(job) {
  const progress = getJobProgress(job.id);
  const pickupEta = parseTimeToday(progress.pickupEta);
  const deadline = new Date(job.deadline);
  const now = new Date();

  if (!pickupEta || isNaN(deadline)) return 0;
  if (now <= pickupEta) return 0;
  if (now >= deadline) return 100;

  const total = deadline - pickupEta;
  const elapsed = now - pickupEta;

  return Math.round((elapsed / total) * 100);
}
  function createJobRowElement(job) {
    const row = document.createElement('div');
    row.className = `job-row ${getJobStatusClass(job.deadline)}`;
    row.draggable = true;

    const notesHtml = job.notes

      : `<span style="color:#6b7280;">No notes</span>`;

    row.innerHTML = `

      <a class="job-number" href="#">${escapeHtml(job.title || 'JOB')}</a>
      <div class="mini-meta">
        <b>${escapeHtml(job.driver || 'Unassigned')}</b><span class="phone-icon">▯</span><br>
        1 pcs<br>2 lbs<br>${escapeHtml(CATEGORY_LABELS[job.category] || job.category || 'Job')}
      </div>
      <div class="route-cell">
        <div class="place"><b>Pickup</b>${escapeHtml(CATEGORY_LABELS[job.category] || 'Dispatch')}</div>
        <div class="timeline"><span class="start">⌂</span><span class="fill ${getProgressPercent(job) >= 100 ? 'late' : ''}" 
      style="width:${Math.min(getProgressPercent(job), 100)}%;">
</span><span class="timeline-text">${escapeHtml(CATEGORY_LABELS[job.category] || '')}</span><span class="end">⌄</span></div>
        <div class="place"><b>Delivery / Notes</b>${notesHtml}</div>
      </div>
    <div class="deadline-cell">
  <b>Deadline:</b> ${escapeHtml(formatDeadline(job.deadline))}<br>
  <span>${getDeadlineStatusText(job.deadline)}</span>
</div>
      <div class="category-badge">${escapeHtml(CATEGORY_LABELS[job.category] || job.category || '')}</div>
    <div class="actions-cell">
<button type="button" class="confirm-btn"></button>

<span class="delete-btn" title="Archive Job">×</span>

<button class="icon-btn menu-trigger" title="Actions">⋮</button>
</div>
    `;

    const menu = document.createElement('div');
    menu.className = 'card-menu';
    menu.hidden = true;
    menu.innerHTML = `
      <div class="menu-row">
        <label>Assign Driver</label>
<input class="menu-driver-input" type="text" placeholder="Driver name">
<button type="button" class="menu-assign-driver">Save Driver</button>

<label style="margin-top:10px;">Change Job Type</label>
<select class="menu-select">
  <option value="" disabled selected>Select…</option>
  <option value="mia">MIA Recovery</option>
  <option value="fll">FLL Recovery</option>
  <option value="tenders">Tenders</option>
  <option value="deliveries">Deliveries</option>
  <option value="dispatched">Dispatched</option>
  <option value="bullshit">Other</option>
</select>
      </div>
      <button type="button" class="menu-delete">Archive</button>
    `;
    row.querySelector('.actions-cell').appendChild(menu);
    const confirmBtn = row.querySelector('.confirm-btn');

    const deleteBtn = row.querySelector('.delete-btn');

deleteBtn.addEventListener('click', async () => {
  const confirmDelete = confirm('Archive this job?');
  if (!confirmDelete) return;

  const oldDate = new Date();
  oldDate.setDate(oldDate.getDate() - 6);

  const { error } = await sb
    .from('jobs')
    .update({ deadline: oldDate.toISOString() })
    .eq('id', job.id);

  if (error) {
    alert('Archive failed.');
    return;
  }

  loadJobs();
});
const progress = getJobProgress(job.id);

if (progress.pickupConfirmed) {
  confirmBtn.textContent = 'Confirm Delivery';
  confirmBtn.classList.add('delivery');
} else {
  confirmBtn.textContent = 'Confirm Pickup';
}

confirmBtn.addEventListener('click', async () => {
  const currentProgress = getJobProgress(job.id);

  if (!currentProgress.pickupConfirmed) {
    const eta = prompt('Enter ETA time:');
    if (!eta) return;

    saveJobProgress(job.id, {
      pickupConfirmed: true,
      pickupEta: eta
    });

    loadJobs();
    return;
  }

  const dropoffTime = prompt('Enter drop off time:');
  if (!dropoffTime) return;

  saveJobProgress(job.id, {
  ...currentProgress,
  deliveryConfirmed: true,
  dropoffTime
});

// 🔥 move to archive (same logic as archive button)
const oldDate = new Date();
oldDate.setDate(oldDate.getDate() - 6);

await sb
  .from('jobs')
  .update({ deadline: oldDate.toISOString() })
  .eq('id', job.id);

loadJobs();
});
    row.querySelector('.menu-trigger').addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.card-menu').forEach(m => { if (m !== menu) m.hidden = true; });
      menu.hidden = !menu.hidden;
    });

    menu.querySelector('.menu-assign-driver').addEventListener('click', async () => {
  const driverInput = menu.querySelector('.menu-driver-input');
  const newDriver = driverInput.value.trim();

  if (!newDriver) return alert('Enter a driver name first.');

  const { error } = await sb
    .from('jobs')
    .update({ driver: newDriver })
    .eq('id', job.id);

  if (error) {
    alert('Driver update failed.');
    return;
  }

  loadJobs();
});

    menu.querySelector('.menu-select').addEventListener('change', async (e) => {
      const dest = e.target.value;
      if (!CATEGORIES.includes(dest)) return;
      const { error } = await sb.from('jobs').update({ category: dest }).eq('id', job.id);
      if (error) alert('Move failed.');
      loadJobs();
    });

    menu.querySelector('.menu-delete').addEventListener('click', async () => {
      const oldDate = new Date();
      oldDate.setDate(oldDate.getDate() - 6);
      const { error } = await sb.from('jobs').update({ deadline: oldDate.toISOString() }).eq('id', job.id);
      if (error) alert('Archive failed.');
      loadJobs();
    });

    document.addEventListener('click', (evt) => { if (!row.contains(evt.target)) menu.hidden = true; });
    row.addEventListener('dragstart', () => { window.__draggingRow = row; row.classList.add('dragging'); });
    row.addEventListener('dragend', () => { window.__draggingRow = null; row.classList.remove('dragging'); });
    return row;
  }

  function clearBoard() { Object.values(cols).forEach(c => c.innerHTML = ''); }
  function clearBoard() {
  activeJobsList.innerHTML = '';
}

function renderJob(job) {
  activeJobsList.appendChild(createJobRowElement(job));
}

  function getUrgentJobs(jobs) {
    return (jobs || [])
      .filter(job => job.category !== 'dispatched' && !isArchivedJob(job))
      .filter(job => !isNaN(new Date(job.deadline)))
      .sort((a,b) => new Date(a.deadline) - new Date(b.deadline))
      .slice(0, 12);
  }
  function renderDueSoon(jobs) {
    const row = document.getElementById('due-soon-row');
    row.innerHTML = '';
    getUrgentJobs(jobs).forEach(job => row.appendChild(createJobRowElement(job)));
    if (!row.children.length) row.innerHTML = '<div class="job-row"><div></div><div class="mini-meta">No urgent jobs</div></div>';
  }
  function populateDriverFilter(jobs) {
  const driverFilter = document.getElementById('driver-filter');
  if (!driverFilter) return;

  const currentValue = driverFilter.value || 'all';

  const drivers = [...new Set(
    (jobs || [])
      .filter(job => !isArchivedJob(job))
      .map(job => job.driver)
      .filter(Boolean)
  )].sort();

  driverFilter.innerHTML = `<option value="all">Driver Name: All</option>`;

  drivers.forEach(driver => {
    const option = document.createElement('option');
    option.value = driver;
    option.textContent = driver;
    driverFilter.appendChild(option);
  });

  driverFilter.value = drivers.includes(currentValue) ? currentValue : 'all';
}
  function renderArchivedJobs(jobs) {
    const row = document.getElementById('completed-jobs-row');
    const query = (document.getElementById('archive-search')?.value || '').trim().toLowerCase();
    row.innerHTML = '';
    (jobs || []).filter(isArchivedJob).filter(job => jobMatchesSearch(job, query))
      .sort((a,b) => new Date(b.deadline) - new Date(a.deadline))
      .forEach(job => row.appendChild(createJobRowElement(job)));
  }

  async function loadJobs() {
    clearBoard();
    const { data, error } = await sb.from('jobs').select('*').order('created_at', { ascending: false });
    if (error) { console.error(error); alert('Failed to load jobs.'); return; }
    ALL_JOBS = data || [];
    populateDriverFilter(ALL_JOBS);
    const query = (document.getElementById('job-search')?.value || '').trim().toLowerCase();
    const selectedCategory = document.getElementById('category-filter')?.value || 'all';
    const selectedClient = document.getElementById('client-filter')?.value || 'all';
const selectedDriver = document.getElementById('driver-filter')?.value || 'all';
const selectedDeliveryDate = document.getElementById('delivery-date-filter')?.value || 'all';

const activeJobs = ALL_JOBS
  .filter(job => !isArchivedJob(job))
  .filter(job => jobMatchesSearch(job, query))
  .filter(job => selectedCategory === 'all' || job.category === selectedCategory)
  .filter(job => selectedClient === 'all' || getJobClient(job) === selectedClient)
.filter(job => selectedDriver === 'all' || job.driver === selectedDriver)
.filter(job => {
  if (selectedDeliveryDate === 'all') return true;

  const d = new Date(job.deadline);
  const now = new Date();
  if (isNaN(d)) return false;

  const sameDay =
    d.getFullYear() === now.getFullYear() &&
    d.getMonth() === now.getMonth() &&
    d.getDate() === now.getDate();

  const tomorrow = new Date(now);
  tomorrow.setDate(now.getDate() + 1);

  const isTomorrow =
    d.getFullYear() === tomorrow.getFullYear() &&
    d.getMonth() === tomorrow.getMonth() &&
    d.getDate() === tomorrow.getDate();

  if (selectedDeliveryDate === 'today') return sameDay;
  if (selectedDeliveryDate === 'tomorrow') return isTomorrow;
  if (selectedDeliveryDate === 'overdue') return d < now;

  return true;
});
    document.getElementById('shipment-count').textContent = activeJobs.length;
    activeJobs
   .sort((a, b) => new Date(a.deadline) - new Date(b.deadline))
    .forEach(renderJob);
    renderArchivedJobs(ALL_JOBS);
  }



  function updateBulkArchiveButton() {
  const checked = document.querySelectorAll('.job-checkbox:checked').length;
  document.getElementById('bulk-archive-btn').classList.toggle('show', checked > 0);
}

document.addEventListener('change', (e) => {
  if (e.target.classList.contains('job-checkbox')) {
    updateBulkArchiveButton();
  }

  if (e.target.id === 'select-all-jobs') {
    document.querySelectorAll('.job-checkbox').forEach(cb => {
      cb.checked = e.target.checked;
    });
    updateBulkArchiveButton();
  }
});

document.getElementById('bulk-archive-btn').addEventListener('click', async () => {
  const selectedIds = Array.from(document.querySelectorAll('.job-checkbox:checked'))
    .map(cb => cb.dataset.id);

  if (!selectedIds.length) return;

  if (!confirm(`Archive ${selectedIds.length} selected jobs?`)) return;

  const oldDate = new Date();
  oldDate.setDate(oldDate.getDate() - 6);

  const { error } = await sb
    .from('jobs')
    .update({ deadline: oldDate.toISOString() })
    .in('id', selectedIds);

  if (error) {
    alert('Bulk archive failed.');
    return;
  }

  loadJobs();
});
document.getElementById('job-search').addEventListener('input', loadJobs);
  document.querySelector('.archive-title').addEventListener('click', () => document.querySelector('.archive-card').classList.toggle('expanded'));
  document.getElementById('archive-search').addEventListener('click', e => e.stopPropagation());
  document.getElementById('archive-search').addEventListener('input', loadJobs);
  ['driver-filter', 'delivery-date-filter', 'category-filter', 'client-filter'].forEach(id => {
  document.getElementById(id)?.addEventListener('change', loadJobs);
});
  document.getElementById('reset-search').addEventListener('click', (e) => { e.preventDefault(); document.getElementById('job-search').value=''; loadJobs(); });

  document.getElementById('job-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('jobTitle').value.trim();
    const driver = document.getElementById('driver').value.trim();
    const deadline = document.getElementById('deadline').value.trim();
    const category = document.getElementById('jobCategory').value;
    const notes = document.getElementById('jobNotes').value.trim();
    if (!title || !driver || !deadline || !category) return;
    const payload = { title, driver, deadline: new Date(deadline).toISOString(), category, notes: notes || null };
    const { error } = await sb.from('jobs').insert(payload);
    if (error) { console.error('Insert error:', error); alert(`Failed to add job: ${error.message}`); return; }
    await loadJobs();
    e.target.reset();
  });

  window.addEventListener('DOMContentLoaded', () => {
    loadJobs();
    sb.channel('jobs-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'jobs' }, loadJobs).subscribe();
  });
</script>
</body>
