    @media print {
  body * {
    visibility: hidden !important;
  }

  #printPreview,
  #printPreview * {
    visibility: visible !important;
  }

  body {
    margin: 0 !important;
    padding: 0 !important;
    background: white !important;
  }

  #printPreview {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    margin: 0 !important;
    padding: 0 !important;
    background: white !important;
    border-radius: 0 !important;
  }

  .front-print-page {
    width: 8.5in;
    height: 11in;
    margin: 0;
    padding: 0;
    page-break-after: always;
    break-after: page;
    overflow: hidden;
    position: relative;
  }

  .front-safe-area {
    position: absolute;
    left: 0.35in;
    right: 0.35in;

    /* top blank space */
    top: 0.60in;

    /* THIS FORCES THE BOTTOM 20-25% TO STAY BLANK */
    height: 7.85in;

    overflow: hidden;
  }

  .front-bottom-blank {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 2.25in;

  }

    width: 8.5in;

    padding: 0.35in;

<body>
  <main class="printing-main">
    <h1 class="printing-title">Speedpack Printing Center</h1>

    <div class="panel">
      <h2>Airspace PDF Formatter</h2>
      <p>Save the Airspace email as PDF, then drag it here.</p>

      <label class="drop-zone" id="dropZone" for="pdfInput">
        Drop Airspace PDF Here or Click to Upload
      </label>

      <input id="pdfInput" type="file" accept="application/pdf" />

  
      <button onclick="printCleanSheet()">Print Clean Sheet</button>
    </div>

    <div class="panel">
      <h2>Extracted PDF Text</h2>
      <textarea id="rawText" placeholder="PDF text will appear here..."></textarea>
    </div>

    <div id="printPreview"></div>
  </main>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const pdfInput = document.getElementById("pdfInput");
    const dropZone = document.getElementById("dropZone");
    const rawTextBox = document.getElementById("rawText");

      function showUploadStatus(message) {
      dropZone.textContent = message;
    }

    function isPdfFile(file) {
      return file && (
        file.type === "application/pdf" ||
        file.name.toLowerCase().endsWith(".pdf")
      );
    }

    async function handlePdfFile(file) {
      if (!file) {
        showUploadStatus("No file selected.");
        return;
      }

      if (!isPdfFile(file)) {
        showUploadStatus("That is not a PDF. Please upload a PDF file.");
        return;
      }

      try {
        showUploadStatus("Reading PDF...");
        await extractPdfText(file);
        showUploadStatus("PDF loaded. Drop another PDF here or click to upload.");
      } catch (err) {
        console.error("PDF upload/read failed:", err);
        showUploadStatus("Could not read this PDF. Try saving it again as PDF, then upload it.");
        alert("PDF failed to load. Open the browser console for details.");
      }
    }

    dropZone.addEventListener("click", () => {
      pdfInput.click();
    });

    pdfInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      await handlePdfFile(file);

      // Allows uploading the same file again if needed
      pdfInput.value = "";
    });

    ["dragenter", "dragover"].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.style.borderColor = "#ffd000";
        dropZone.style.background = "#222";
      });
    });

    ["dragleave", "drop"].forEach(eventName => {
      dropZone.addEventListener(eventName, (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.style.borderColor = "#777";
        dropZone.style.background = "#181818";
      });
    });

    dropZone.addEventListener("drop", async (e) => {
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      await handlePdfFile(file);
    });

    // Prevent browser from opening the PDF if they drop it outside the box
    window.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    window.addEventListener("drop", (e) => {
      e.preventDefault();
    });

    async function extractPdfText(file) {
  rawTextBox.value = "";
  document.getElementById("printPreview").innerHTML = `
    <div style="padding:20px; background:white; color:black; font-size:24px; font-weight:bold;">
      Reading PDF... please wait.
    </div>
  `;

  const arrayBuffer = await file.arrayBuffer();

  const pdf = await pdfjsLib.getDocument({
    data: arrayBuffer
  }).promise;

  let fullText = "";

  // First try normal PDF text extraction
  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    document.getElementById("printPreview").innerHTML = `
      <div style="padding:20px; background:white; color:black; font-size:24px; font-weight:bold;">
        Reading PDF page ${pageNum} of ${pdf.numPages}...
      </div>
    `;

    const page = await pdf.getPage(pageNum);
    const content = await page.getTextContent();

    const strings = content.items
      .map(item => item.str)
      .filter(Boolean);

    fullText += strings.join("\n") + "\n\n";
  }

  rawTextBox.value = fullText.trim();

  // If normal text extraction worked, format immediately
  if (rawTextBox.value) {
    formatAirspace();
    return;
  }

  // If no text was found, use OCR fallback
  document.getElementById("printPreview").innerHTML = `
    <div style="padding:20px; background:white; color:black; font-size:24px; font-weight:bold;">
      PDF has no readable text. Running OCR... this may take a little while.
    </div>
  `;

  let ocrText = "";

  for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
    document.getElementById("printPreview").innerHTML = `
      <div style="padding:20px; background:white; color:black; font-size:24px; font-weight:bold;">
        OCR reading page ${pageNum} of ${pdf.numPages}...
      </div>
    `;

    const page = await pdf.getPage(pageNum);
    const viewport = page.getViewport({ scale: 2.5 });

    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: context,
      viewport: viewport
    }).promise;

    const result = await Tesseract.recognize(canvas, "eng", {
      logger: progress => {
        if (progress.status === "recognizing text") {
          const percent = Math.round(progress.progress * 100);
          document.getElementById("printPreview").innerHTML = `
            <div style="padding:20px; background:white; color:black; font-size:24px; font-weight:bold;">
              OCR reading page ${pageNum} of ${pdf.numPages}... ${percent}%
            </div>
          `;
        }
      }
    });

    ocrText += result.data.text + "\n\n";
  }

  rawTextBox.value = ocrText.trim();

  if (!rawTextBox.value) {
    document.getElementById("printPreview").innerHTML = `
      <div style="padding:20px; background:white; color:black; font-size:22px; font-weight:bold;">
        OCR could not read this PDF.
      </div>
    `;
    return;
  }

  formatAirspace();
}

    function findValue(text, patterns) {
      for (const pattern of patterns) {
        const match = text.match(pattern);
        if (match && match[1]) return match[1].trim();
      }
      return "";
    }

    function getBlock(text, startWords, endWords) {
      const startRegex = new RegExp(startWords.join("|"), "i");
      const startMatch = text.search(startRegex);
      if (startMatch === -1) return "";

      const afterStart = text.slice(startMatch);

      let endIndex = -1;
      for (const word of endWords) {
        const idx = afterStart.slice(20).search(new RegExp(word, "i"));
        if (idx !== -1 && (endIndex === -1 || idx < endIndex)) {
          endIndex = idx + 20;
        }
      }

      return endIndex === -1 ? afterStart.trim() : afterStart.slice(0, endIndex).trim();
    }

    function normalizeAirspaceText(text) {
  return text
    .replace(/\r/g, "")
    .replace(/[ \t]+/g, " ")
    .replace(/\n{3,}/g, "\n\n")
    .replace(/ATTACHMENTS\s*\(\d+\)[\s\S]*?(?=Order details|ORDER REFERENCES|PICKUP ADDRESS|FLIGHT INFO|$)/gi, "")
    .replace(/Please click the link\(s\)[\s\S]*?(?=Order details|ORDER REFERENCES|PICKUP ADDRESS|FLIGHT INFO|$)/gi, "")
    .replace(/[A-Z0-9_-]+\.pdf/gi, "")
    .replace(/Kind regards,?/gi, "")
    .replace(/Download this Driver App[\s\S]*?(?=Call us|ORDER REFERENCES|PICKUP ADDRESS|$)/gi, "")
    .replace(/Call us 24-7[\s\S]*?(?=Airspace <|ORDER REFERENCES|PICKUP ADDRESS|$)/gi, "")
    .replace(/Have the App already\?[\s\S]*?(?=Call us|ORDER REFERENCES|PICKUP ADDRESS|$)/gi, "")
    .replace(/BEGIN JOB/gi, "")
    .replace(/On .* wrote:[\s\S]*/gi, "")
    .trim();
}

function getLastValue(text, patterns) {
  let finalValue = "";

  for (const pattern of patterns) {
    const matches = [...text.matchAll(pattern)];
    if (matches.length) {
      const last = matches[matches.length - 1];
      if (last && last[1]) finalValue = last[1].trim();
    }
  }

  return finalValue;
}

function getSection(text, heading, stopHeadings) {
  const headingPattern = new RegExp(
    heading.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\s*:?\\s*",
    "gi"
  );

  const matches = [...text.matchAll(headingPattern)];
  if (!matches.length) return "";

  // Use the last matching section because Gmail thread PDFs often contain old updates first
  const match = matches[matches.length - 1];
  const start = match.index + match[0].length;
  const after = text.slice(start);

  let end = after.length;

  for (const stop of stopHeadings) {
    const stopPattern = new RegExp(
      "\\n\\s*" + stop.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "\\s*:?\\s*",
      "i"
    );

    const stopMatch = after.search(stopPattern);
    if (stopMatch !== -1 && stopMatch < end) {
      end = stopMatch;
    }
  }

  return after.slice(0, end).trim();
}

function cleanupSection(value) {
  if (!value) return "";

  return value
    .split("\n")
    .map(line => line.trim())
    .filter(line => {
      if (!line) return false;

      const lower = line.toLowerCase();

      if (lower.includes("attachments")) return false;
      if (lower.includes("please click")) return false;
      if (lower.includes(".pdf")) return false;
      if (lower.includes("kind regards")) return false;
      if (lower.includes("download this driver app")) return false;
      if (lower.includes("google play")) return false;
      if (lower.includes("app store")) return false;
      if (lower.includes("begin job")) return false;
      if (lower.includes("airspace.com")) return false;
      if (lower.includes("quoted text hidden")) return false;
      if (lower.includes("quoted costs")) return false;

      return true;
    })
    .join("\n")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

  return value
    .split("\n")

function parseAirspace(text) {
  const cleaned = normalizeAirspaceText(text);

  const stopHeadings = [
    "PICKUP TIME",
    "DELIVER BY",
    "DELIVERY INSTRUCTIONS",
    "AIR WAYBILLS",
    "Order details",
    "ORDER REFERENCES",
    "ORDER REQUIREMENTS",
    "PICKUP ADDRESS",
    "DELIVERY ADDRESS",
    "DELIVERY CONTACT",
    "FLIGHT INFO",
    "AIRLINE ACCOUNT NUMBER",
    "VEHICLE TYPE",
    "DANGEROUS GOODS",
    "TOTAL PIECES",
    "TOTAL WEIGHT",
    "Commodity",
    "ID"
  ];

  const trackingId = getLastValue(cleaned, [
    /Tracking ID[:\s]*([A-Z0-9.-]+)/gi
  ]);

  const orderNumber = getLastValue(cleaned, [
    /Order #[:\s]*([A-Z0-9-]+)/gi,
    /Order Number[:\s]*([A-Z0-9-]+)/gi
  ]);

  const pickupTime = cleanupSection(getSection(cleaned, "PICKUP TIME", stopHeadings));
  const deliverBy = cleanupSection(getSection(cleaned, "DELIVER BY", stopHeadings));
  const deliveryInstructions = cleanupSection(getSection(cleaned, "DELIVERY INSTRUCTIONS", stopHeadings));
  const airWaybills = cleanupSection(getSection(cleaned, "AIR WAYBILLS", stopHeadings));

  const crNumber = getLastValue(cleaned, [
    /CR#[:\s]*([A-Z0-9-]+)/gi,

  ]);

  return {
    trackingId,

  };
}








    function cleanText(value) {
      if (!value) return "N/A";
      return value
        .replace(/\n{3,}/g, "\n\n")
        .replace(/^\s+|\s+$/g, "")
        .replace(/(PICKUP ADDRESS|DELIVERY ADDRESS)/gi, "")
        .trim();
    }
function resetPrintingCenter() {
  rawTextBox.value = "";
  pdfInput.value = "";

  document.getElementById("printPreview").innerHTML = "";

  dropZone.textContent = "Drop Airspace PDF Here or Click to Upload";
  dropZone.style.borderColor = "#777";
  dropZone.style.background = "#181818";
}

function printCleanSheet() {
  window.print();

  // Give Chrome time to open/send the print job before clearing the page
  setTimeout(() => {
    resetPrintingCenter();
  }, 1500);
}
  function printBox(title, content, extraClass = "") {
  const clean = cleanText(content);
  if (!clean || clean === "N/A") return "";

  return `
    <div class="parsed-box ${extraClass}">
      <h3>${title}</h3>
      <pre>${clean}</pre>
    </div>
  `;
}
