<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Programming Login - Speedpack Express</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      background: url('website images/airportphoto.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      margin: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: -1;
    }

    body > nav {
      position: relative !important;
      top: 0 !important;
      left: auto !important;
      right: auto !important;
      background: transparent !important;
      box-shadow: none !important;
      border: 0 !important;
      z-index: 10;
    }

    body > nav .navbar-container {
      min-height: 120px !important;
      height: auto !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      padding: 10px 40px !important;
    }

    body > nav .navbar-logo {
      height: 300px !important;
      width: auto !important;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,.45));
    }

    body > nav a {
      color: #fff !important;
      text-shadow: 0 2px 8px rgba(0,0,0,.55);
      font-weight: 800;
    }

    .login-main {
      min-height: calc(100vh - 160px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 20px 70px;
      box-sizing: border-box;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(15, 15, 15, 0.88);
      border: 1px solid rgba(255, 199, 51, 0.5);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.45);
      color: white;
    }

    .login-card h1 {
      margin: 0 0 10px;
      color: #FFC733;
      text-align: center;
      font-size: 2em;
    }

    .login-card p {
      text-align: center;
      color: #e7e7e7;
      margin-bottom: 22px;
    }

    .login-card label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
    }

    .login-card input {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    .login-card button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: 0;
      border-radius: 8px;
      background: #FFC733;
      color: #222;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .login-card button:hover {
      background: #ffd766;
    }

    .error-message {
      display: none;
      margin-top: 14px;
      color: #ff6b6b;
      text-align: center;
      font-weight: bold;
    }

    .back-link {
      display: block;
      text-align: center;
      color: white;
      margin-top: 18px;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <nav>
    <div class="navbar-container">
      <div class="navbar-logo-container">
        <img src="website images/SPEEDPACK-EXPRESS-AI-LOGO.png" alt="Speedpack Express Logo" class="navbar-logo" />
      </div>

      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li class="dropdown">
          <a href="contact.html">Contact</a>
          <ul class="dropdown-content">
            <li><a href="contact.html">Contact Us</a></li>
            <li><a href="careers.html">Careers</a></li>
            <li><a href="support.html">Support</a></li>
          </ul>
        </li>
        <li><a href="login.html">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main class="login-main">
    <div class="login-card">
      <h1>Programming Login</h1>
      <p>Enter the Speedpack programming account to continue.</p>

      <form id="programmingLoginForm">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />

        <button type="submit">Login</button>

        <div id="loginError" class="error-message">
          Invalid login. Please try again.
        </div>
      </form>

      <a href="speedpack_online.html" class="back-link">Back to Speedpack Online</a>
    </div>
  </main>

  <script>
    const SUPABASE_URL = "https://dbpcuimbxdqlknqvpmbb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRicGN1aW1ieGRxbGtucXZwbWJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ4NjAxNjIsImV4cCI6MjA3MDQzNjE2Mn0.5O_hoeXuR4tLPMBWwveUTHUCQ9WbJTsiAZr4iwPcdMg";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("programmingLoginForm");
    const errorBox = document.getElementById("loginError");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorBox.style.display = "none";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
  email: email,
  password: password
});

      if (error || !data.user) {
  console.error("LOGIN ERROR:", error);
  errorBox.textContent = error?.message || "Invalid login. Please try again.";
  errorBox.style.display = "block";
  return;
}

      window.location.href = "programming.html";
    });
  </script>
</body>
</html>
